# Nom de l'application (pour Spring Cloud / Eureka)
spring.application.name=product-service

# Configuration de la base de données PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/product-service
spring.datasource.username=postgres
spring.datasource.password=Passer@1949

# Spécifie le driver JDBC pour PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Configuration Eureka
#eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka

# Pour un port aléatoire
server.port=5271
